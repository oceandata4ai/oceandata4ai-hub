      <nav class="nav-links">

  <main>
    <div class="page-hero"><div class="container"><h1>Contact</h1><p>Partnerships, press, or community questions.</p></div></div>
    <section><div class="container">
      <div class="form-card">
        <form data-demo-form>
          <div class="form-group"><label for="name">Name</label><input id="name" name="name" required /></div>
          <div class="form-group"><label for="email">Email</label><input id="email" name="email" type="email" required /></div>
          <div class="form-group"><label for="topic">Topic</label>
            <select id="topic" name="topic"><option>General inquiry</option><option>Partnership</option><option>Press</option><option>Report an issue</option></select>
          </div>
          <div class="form-group"><label for="message">Message</label><textarea id="message" name="message" required></textarea></div>
          <button type="submit" class="btn btn-primary">Send message</button>
          <p class="form-msg" style="margin-top:0.75rem;font-size:0.85rem"></p>
        </form>
      </div>
    </div></section>
  </main>
  <footer class="footer"><div class="container"><div class="footer-bottom"><span>© 2026 OceanData4AI</span></div></div></footer>
